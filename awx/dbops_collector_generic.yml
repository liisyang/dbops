---
# DBOPS Generic Collector — Phase 3.3A Role Routing
# ===================================================
# This playbook receives collector items and routes them to the correct role
# based on check_code.
#
# Phase 3.1/3.2: port_check role — BACKWARD COMPATIBLE (unchanged behavior)
# Phase 3.3A:    db_fact_collect + os_fact_collect — NEW fact collection roles
#
# Usage (called by AWX Job Template JT_DBOPS_COLLECTOR_GENERIC):
#   extra_vars:
#     schema_version: 1
#     run_id: "RUN-..."
#     run_type: "asset_verify"
#     callback_url: "https://..."
#     items: [...]

- name: DBOPS Generic Collector
  hosts: localhost
  gather_facts: no
  vars:
    collector_results: []

  tasks:
    - name: Validate required extra_vars
      assert:
        that:
          - run_id is defined
          - callback_url is defined
          - items is defined
          - items | length > 0
        fail_msg: "Missing required extra_vars: run_id, callback_url, items"

    # =========================================================================
    # Port Check Role — Phase 3.1/3.2 (EXISTING BEHAVIOR, FULLY PRESERVED)
    # =========================================================================
    - name: Route to port_check (existing behavior preserved)
      include_role:
        name: port_check
      loop: "{{ items }}"
      loop_control:
        loop_var: item
      when:
        - item.check_code in ['DB_PORT_REACHABILITY', 'SSH_PORT_REACHABILITY', 'PORT_CANDIDATE_REACHABILITY']

    # =========================================================================
    # DB Fact Collection Role — Phase 3.3A (NEW)
    # =========================================================================
    - name: Route to db_fact_collect
      include_role:
        name: db_fact_collect
      loop: "{{ items }}"
      loop_control:
        loop_var: item
      when:
        - item.check_code in ['DB_BASIC_FACT_COLLECTION', 'DB_VERSION_FACT_COLLECTION', 'DB_ROLE_FACT_COLLECTION']

    # =========================================================================
    # OS Fact Collection Role — Phase 3.3A (NEW)
    # =========================================================================
    - name: Route to os_fact_collect
      include_role:
        name: os_fact_collect
      loop: "{{ items }}"
      loop_control:
        loop_var: item
      when:
        - item.check_code == 'OS_BASIC_FACT_COLLECTION'

    # =========================================================================
    # Callback — send results back to DBOPS API
    # =========================================================================
    - name: Send callback to DBOPS
      uri:
        url: "{{ callback_url }}"
        method: POST
        body_format: json
        body:
          schema_version: "{{ schema_version | default(1) }}"
          run_id: "{{ run_id }}"
          awx_job_id: "{{ tower_job_id | default(omit) }}"
          checked_by: "awx"
          checked_at: "{{ ansible_date_time.iso8601 }}"
          items: "{{ collector_results }}"
        headers:
          X-Collector-Token: "{{ lookup('env', 'DBOPS_CALLBACK_TOKEN') | default('') }}"
          Content-Type: "application/json"
        status_code: 200
      register: callback_response
      ignore_errors: yes

    - name: Log callback result
      debug:
        msg: "Callback sent — status: {{ callback_response.status | default('unknown') }}"
